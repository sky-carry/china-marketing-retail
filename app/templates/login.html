<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>登录 · 库存核对看板</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%232a78d6'/%3E%3Cpath d='M14 24h14M14 32h10' stroke='%23ffffff' stroke-width='5' stroke-linecap='round' opacity='.55'/%3E%3Cpath d='M26 42l9 9 16-18' stroke='%23ffffff' stroke-width='7' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<script>
(function () {
  var t = localStorage.getItem('theme');
  if (t === 'light' || t === 'dark') document.documentElement.dataset.theme = t;
})();
</script>
<style>
:root { --surface:#fcfcfb; --page:#f9f9f7; --ink:#0b0b0b; --ink2:#52514e; --ink3:#898781;
  --grid:#e1e0d9; --s1:#2a78d6; --crit:#d03b3b; --border:rgba(11,11,11,.10); }
:root[data-theme="dark"] { --surface:#1a1a19; --page:#0d0d0d; --ink:#fff; --ink2:#c3c2b7; --ink3:#898781;
  --grid:#2c2c2a; --s1:#3987e5; --crit:#e66767; --border:rgba(255,255,255,.10); }
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) { --surface:#1a1a19; --page:#0d0d0d; --ink:#fff; --ink2:#c3c2b7; --ink3:#898781;
    --grid:#2c2c2a; --s1:#3987e5; --crit:#e66767; --border:rgba(255,255,255,.10); } }
* { box-sizing:border-box; margin:0; }
body { background:var(--page); color:var(--ink); min-height:100vh; display:flex;
  align-items:center; justify-content:center;
  font:14px/1.5 system-ui,-apple-system,"Segoe UI","Microsoft YaHei",sans-serif; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:14px;
  padding:36px 34px 30px; width:min(360px, 92vw); box-shadow:0 8px 30px rgba(0,0,0,.08); }
.logo { display:flex; align-items:center; gap:12px; margin-bottom:6px; }
.logo svg { flex:none; }
h1 { font-size:17px; font-weight:650; }
.sub { color:var(--ink3); font-size:12.5px; margin-bottom:22px; }
label { display:block; font-size:12.5px; color:var(--ink2); margin:14px 0 5px; }
input { width:100%; background:var(--page); color:var(--ink); border:1px solid var(--grid);
  border-radius:8px; padding:9px 12px; font-size:14px; }
input:focus { outline:2px solid var(--s1); outline-offset:-1px; border-color:transparent; }
button { width:100%; margin-top:22px; background:var(--s1); color:#fff; border:none;
  border-radius:8px; padding:10px; font-size:14px; font-weight:600; cursor:pointer; }
button:hover { filter:brightness(1.08); }
.err { background:color-mix(in srgb, var(--crit) 12%, transparent); color:var(--crit);
  border-radius:8px; padding:8px 12px; font-size:13px; margin-top:16px; }
</style></head><body>
<form class="card" method="post" action="/login">
  <div class="logo">
    <svg width="34" height="34" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="#2a78d6"/><path d="M14 24h14M14 32h10" stroke="#fff" stroke-width="5" stroke-linecap="round" opacity=".55"/><path d="M26 42l9 9 16-18" stroke="#fff" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <h1>库存核对看板</h1>
  </div>
  <div class="sub">伯俊 vs 京东秒送 / 美团闪购</div>
  <label>账号</label>
  <input name="u" autocomplete="username" autofocus required>
  <label>密码</label>
  <input name="p" type="password" autocomplete="current-password" required>
  {ERR}
  <button>登 录</button>
</form></body></html>
